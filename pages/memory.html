<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Our story together | The Memory Architect · game kenangan</title>
  <!-- Tailwind via CDN + fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
    }
    body {
      background-color: #fdf2f2; /* soft pastel pink sesuai tema */
      background-image: radial-gradient(circle at 10% 30%, rgba(255, 225, 225, 0.4) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(230, 240, 255, 0.5) 0%, transparent 35%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }

    /* kartu putih dengan bayangan lembut */
    .memory-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -18px rgba(150, 120, 130, 0.35), 0 10px 20px -5px rgba(200, 160, 170, 0.2);
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      border: 1px solid rgba(255, 245, 245, 0.8);
    }

    .memory-card:hover {
      box-shadow: 0 30px 55px -18px rgba(140, 100, 120, 0.45);
    }

    /* area pertanyaan dengan transisi fade */
    .question-fade {
      transition: opacity 0.3s ease-in-out;
      opacity: 1;
    }

    .question-fade.fade-out {
      opacity: 0;
    }

    /* tombol estetik minimal */
    .next-btn {
      background-color: #ffe4e4; /* soft pink */
      color: #4a3f4f;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 14px rgba(235, 150, 170, 0.25);
      transition: all 0.2s;
      border: 1px solid #ffcfcf;
    }

    .next-btn:hover {
      background-color: #ffd9d9;
      box-shadow: 0 10px 18px rgba(220, 130, 150, 0.3);
      transform: scale(1.02);
    }

    .next-btn:active {
      transform: scale(0.98);
      background-color: #fbc4c4;
    }

    /* container card width */
    .card-container {
      max-width: 36rem;
      width: 100%;
      padding: 0 0.5rem;
    }

    /* teks pertanyaan nyaman di mobile */
    .question-text {
      font-size: 1.6rem;
      line-height: 1.4;
      font-weight: 350;
      color: #2e2e3a;
    }

    @media (max-width: 480px) {
      .question-text {
        font-size: 1.4rem;
      }
      .next-btn {
        font-size: 1.2rem;
        padding: 0.9rem 1.8rem;
      }
    }

    /* whisper kecil */
    .tiny-note {
      color: #9e8d9e;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <!-- kartu utama putih -->
    <div class="memory-card p-8 md:p-10 text-center">
      
      <!-- head kecil (dekoratif) -->
      <div class="flex justify-center items-center gap-2 mb-3 tiny-note text-sm">
        <span class="w-2 h-2 bg-pink-200 rounded-full"></span>
        <span class="tracking-widest text-[#b698a2]">MEMORY ARCHITECT</span>
        <span class="w-2 h-2 bg-pink-200 rounded-full"></span>
      </div>

      <!-- area pertanyaan dengan transisi fade -->
      <div id="questionContainer" class="question-fade py-5 px-1">
        <p id="questionDisplay" class="question-text">
          <!-- diisi javascript -->
        </p>
      </div>

      <!-- garis tipis pemisah -->
      <div class="w-16 h-px bg-pink-200 mx-auto my-4 opacity-50"></div>

      <!-- tombol next memory -->
      <button id="nextMemoryBtn" class="next-btn inline-flex items-center justify-center gap-2 mx-auto mt-4 shadow-sm">
        Next Memory <span class="text-xl">➔</span>
      </button>
    </div>

    <!-- footer kecil (optional) biar makin estetik -->
    <p class="text-center mt-6 text-xs text-[#baa7b2] tracking-wide">— satu kenangan, satu cerita —</p>
  </div>

  <script>
    (function() {
      // daftar pertanyaan (10 memories ringan & menghibur)
      const questionList = [
        "Kesan pertama kamu pas liat aku: Jujur, aku keliatan aneh nggak?",
        "Makanan pertama yang kita makan bareng, inget nggak di mana?",
        "Momen paling lucu/malu-maluin yang pernah kita alamin berdua?",
        "Coba tiruin gaya aku pas lagi ngambek atau lagi manja!",
        "Satu lagu yang liriknya menurut kamu \"kita banget\".",
        "Foto favorit kamu tentang kita berdua yang ada di galeri HP kamu.",
        "Hal paling random yang pernah kita omongin sampe tengah malem.",
        "Kalau kita punya kucing, menurut kamu namanya siapa yang paling cocok?",
        "Satu sifat aku yang pertama kali bikin kamu ngerasa nyaman.",
        "Kado atau barang dari aku yang paling sering kamu pake/simpen."
      ];

      // ambil elemen
      const questionDisplay = document.getElementById('questionDisplay');
      const container = document.getElementById('questionContainer');
      const nextBtn = document.getElementById('nextMemoryBtn');

      // state untuk pertanyaan saat ini (biar ga gampang sama)
      let currentQuestionIndex = -1; // -1 artinya belum ada

      // fungsi ambil pertanyaan random (beda dari yg sekarang jika memungkinkan)
      function getRandomQuestion() {
        if (questionList.length === 0) return '✨ tidak ada pertanyaan ✨';
        
        // kalau cuma 1 item, ya itu terus
        if (questionList.length === 1) return questionList[0];
        
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * questionList.length);
        } while (newIndex === currentQuestionIndex && questionList.length > 1);
        
        currentQuestionIndex = newIndex;
        return questionList[currentQuestionIndex];
      }

      // fungsi untuk mengganti teks dengan efek fade
      function updateQuestionWithFade() {
        // fade out
        container.classList.add('fade-out');
        
        setTimeout(() => {
          // ganti pertanyaan saat elemen "hilang"
          const newQuestion = getRandomQuestion();
          questionDisplay.textContent = newQuestion;
          
          // fade in
          container.classList.remove('fade-out');
        }, 150); // 150ms sesuai transisi css (0.3s total, setengahnya biar halus)
      }

      // inisialisasi pertama: tampilkan pertanyaan random tanpa fade (langsung)
      function setInitialQuestion() {
        const initialQuestion = questionList[Math.floor(Math.random() * questionList.length)];
        // set index
        currentQuestionIndex = questionList.indexOf(initialQuestion);
        questionDisplay.textContent = initialQuestion;
        // pastikan container tidak fade-out
        container.classList.remove('fade-out');
      }

      // panggil saat load
      setInitialQuestion();

      // event listener untuk tombol next
      nextBtn.addEventListener('click', function() {
        updateQuestionWithFade();
      });

      // optional: dukungan sentuhan / tidak ada masalah di mobile
      // jika ingin tambahan aksesibilitas (keyboard) sudah cukup

      // (bonus) handle kasus jika array kosong? tidak mungkin.
    })();
  </script>

  <!-- catatan: fade diatur dengan class fade-out, transisi di css .question-fade -->
  <!-- transisi smooth 0.3s, dan saat fade-out opacity 0, lalu berubah -->
</body>
</html>
