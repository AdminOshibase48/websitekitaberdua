<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>our story together | The Memory Architect · our journey</title>
  <!-- Tailwind + Fonts Quicksand / Nunito -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Quicksand', 'Nunito', sans-serif; }
    body {
      background: linear-gradient(135deg, #fde9e0 0%, #e2f0f5 100%);
      min-height: 100vh;
      margin: 0;
      transition: background 0.3s;
    }
    /* container utama biar lembut */
    .glass-card {
      background: rgba(255, 250, 245, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 245, 235, 0.6);
      box-shadow: 0 20px 40px -18px rgba(140, 130, 120, 0.3);
    }
    /* floating hearts / stars di background */
    .floating-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .float-item {
      position: absolute;
      color: rgba(255, 200, 210, 0.4);
      font-size: 2rem;
      user-select: none;
      animation: floatAround 16s infinite ease-in-out;
    }
    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.3; }
      33% { transform: translate(30px, -20px) rotate(8deg) scale(1.2); opacity: 0.6; }
      66% { transform: translate(-20px, 30px) rotate(-6deg) scale(0.9); opacity: 0.4; }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.3; }
    }
    /* transisi fade untuk pertanyaan */
    .fade-question {
      transition: opacity 0.25s ease-in-out;
    }
    .hidden-question {
      opacity: 0;
    }
    .visible-question {
      opacity: 1;
    }
    /* layout tombol fullscreen di pojok */
    .fullscreen-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      background: rgba(255, 245, 235, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid #ffcfb6;
      border-radius: 60px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #7c6a5e;
      box-shadow: 0 5px 12px rgba(252, 182, 159, 0.3);
      transition: 0.2s;
      cursor: pointer;
    }
    .fullscreen-btn:hover {
      background: #ffe7db;
      transform: scale(1.02);
    }
    /* responsif ekstra */
    @media (max-width: 480px) {
      .fullscreen-btn {
        bottom: 16px;
        right: 16px;
        padding: 8px 14px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body class="antialiased flex items-center justify-center p-4 sm:p-6">

  <!-- floating background (bintang / hati) -->
  <div class="floating-bg" id="floatingBg"></div>

  <!-- tombol fullscreen (pojok kanan bawah) -->
  <button id="fullscreenToggle" class="fullscreen-btn" title="layar penuh / keluar">
    <span id="fsIcon">⛶</span> <span class="hidden sm:inline">layar penuh</span>
  </button>

  <!-- kontainer utama -->
  <main class="w-full max-w-2xl relative z-10">

    <!-- halaman pembuka (start screen) -->
    <div id="startScreen" class="glass-card rounded-3xl p-8 md:p-12 text-center transition-all">
      <h1 class="text-4xl md:text-5xl font-medium text-[#876b5a] tracking-wide">The Memory Architect</h1>
      <p class="text-lg md:text-xl text-[#a78e7d] mt-3 font-light">Membangun Kembali Kenangan Manis Kita</p>
      
      <div class="mt-10">
        <button id="startBtn" class="bg-[#ffd9cc] hover:bg-[#ffcdbb] text-[#6d5344] text-xl md:text-2xl px-12 py-5 rounded-full shadow-md transition duration-200 active:scale-95 font-medium border border-white/50">
          Mulai Petualangan! ✨
        </button>
      </div>
      <p class="text-xs text-[#b9a392] mt-8 opacity-70">— siap nostalgia? —</p>
    </div>

    <!-- halaman permainan (kuestioner) awalnya hidden -->
    <div id="gameScreen" class="glass-card rounded-3xl p-7 md:p-10 hidden">
      
      <!-- progress indicator -->
      <div class="flex justify-between items-center text-[#a18b7c] text-sm md:text-base mb-5 px-2">
        <span id="progressText" class="font-medium">Pertanyaan 1 dari 15</span>
        <span class="flex gap-1">
          <span class="w-2 h-2 bg-[#fbc4b4] rounded-full"></span>
          <span class="w-2 h-2 bg-[#fbd7cc] rounded-full"></span>
          <span class="w-2 h-2 bg-[#fceae5] rounded-full"></span>
        </span>
      </div>

      <!-- area pertanyaan dengan fade -->
      <div id="questionWrapper" class="min-h-[180px] md:min-h-[200px] flex items-center justify-center fade-question visible-question">
        <p id="questionText" class="text-2xl md:text-3xl text-center font-medium text-[#5f4e43] leading-relaxed">
          <!-- akan diisi javascript -->
        </p>
      </div>

      <!-- tombol navigasi -->
      <div class="flex flex-col sm:flex-row gap-4 justify-between items-center mt-10">
        <button id="prevBtn" class="w-full sm:w-auto px-7 py-4 rounded-full bg-white/60 border border-[#ffcfbb] text-[#7b6253] text-lg shadow-sm hover:bg-white/80 transition disabled:opacity-30 disabled:pointer-events-none">
          ← Sebelumnya
        </button>
        
        <button id="nextBtn" class="w-full sm:w-auto px-9 py-4 rounded-full bg-[#ffd3c0] text-[#5d4437] text-lg font-medium shadow-md hover:bg-[#ffc9b2] transition active:scale-95 disabled:opacity-40 disabled:pointer-events-none">
          Selanjutnya →
        </button>
      </div>

      <!-- catatan kecil (opsional) -->
      <p class="text-center text-[#b29b8d] text-xs mt-8 italic">⋆｡°✩ satu kenangan, satu cerita</p>
    </div>

    <!-- halaman penutup (setelah selesai) awalnya hidden, muncul dari game -->
    <div id="endScreen" class="glass-card rounded-3xl p-10 md:p-14 text-center hidden">
      <p class="text-3xl md:text-4xl text-[#7b6253] font-light leading-relaxed">
        💬 Terima kasih sudah membangun kenangan indah ini lagi bersamaku. Aku sayang kamu.
      </p>
      <div class="mt-10 text-5xl opacity-70">🌸</div>
    </div>
  </main>

  <script>
    (function() {
      // ---------- DAFTAR PERTANYAAN (array) ----------
      const questions = [
        "Momen paling memalukan yang pernah kita alami bareng?",
        "Kencan pertama kita yang paling kamu inget apa?",
        "Chat paling cringe atau lucu yang pernah kita kirim satu sama lain?",
        "Lagu yang kalau kamu denger, langsung inget muka atau momen sama aku?",
        "Makanan atau minuman yang paling sering kita pesen bareng?",
        "Hal kecil apa dari aku yang pertama kali bikin kamu tertarik?",
        "Kejutan paling nggak terduga yang pernah aku kasih ke kamu?",
        "Film atau serial yang paling berkesan kita tonton bareng?",
        "Tempat nongkrong favorit kita berdua dan kenapa?",
        "Hal paling receh yang pernah bikin kita ketawa ngakak sampai sakit perut?",
        "Kebiasaan aneh aku yang bikin kamu geleng-geleng tapi juga gemes?",
        "Apa impian konyol yang pengen banget kita wujudin bareng?",
        "Pernah nggak kamu kepikiran 'wah kok bisa ya aku sama dia?' Tapi ujung-ujungnya malah bersyukur?",
        "Kalau kita bisa rewind ke satu momen, momen apa yang pengen kamu ulang?",
        "Apa satu hal yang selalu bikin kamu ngerasa nyaman banget kalau lagi sama aku?"
      ];
      const totalQ = questions.length;

      // ---------- ELEMEN DOM ----------
      const startScreen = document.getElementById('startScreen');
      const gameScreen = document.getElementById('gameScreen');
      const endScreen = document.getElementById('endScreen');
      const startBtn = document.getElementById('startBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const questionText = document.getElementById('questionText');
      const progressText = document.getElementById('progressText');
      const questionWrapper = document.getElementById('questionWrapper');

      // state
      let currentIndex = 0; // 0-based
      let isFading = false;

      // helper untuk menampilkan pertanyaan + progress
      function displayQuestion(index) {
        if (index < 0 || index >= totalQ) return;

        // fade-out dulu
        questionWrapper.classList.add('hidden-question');
        questionWrapper.classList.remove('visible-question');

        setTimeout(() => {
          // ganti teks dan progress
          questionText.innerText = questions[index];
          progressText.innerText = `Pertanyaan ${index+1} dari ${totalQ}`;

          // update status tombol prev/next (disable di ujung)
          if (index === 0) {
            prevBtn.disabled = true;
          } else {
            prevBtn.disabled = false;
          }

          // jika di index terakhir ubah tombol next jadi "Selesai Bermain"
          if (index === totalQ - 1) {
            nextBtn.innerText = 'Selesai Bermain 🎀';
          } else {
            nextBtn.innerText = 'Selanjutnya →';
          }

          // fade-in
          questionWrapper.classList.remove('hidden-question');
          questionWrapper.classList.add('visible-question');
        }, 150); // sedikit delay sesuai transisi
      }

      // fungsi untuk beralih ke game screen (reset index jika perlu)
      function startGame() {
        startScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        endScreen.classList.add('hidden');
        currentIndex = 0;
        displayQuestion(currentIndex);
      }

      // fungsi penutup (selesai bermain)
      function showEndScreen() {
        gameScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');
        startScreen.classList.add('hidden');
      }

      // event start
      startBtn.addEventListener('click', startGame);

      // tombol sebelumnya
      prevBtn.addEventListener('click', () => {
        if (isFading) return;
        if (currentIndex > 0) {
          currentIndex--;
          displayQuestion(currentIndex);
        }
      });

      // tombol next / selesai
      nextBtn.addEventListener('click', () => {
        if (isFading) return;
        // jika ini pertanyaan terakhir (index totalQ-1) → selesai
        if (currentIndex === totalQ - 1) {
          showEndScreen();
          return;
        }
        // otherwise lanjut
        if (currentIndex < totalQ - 1) {
          currentIndex++;
          displayQuestion(currentIndex);
        }
      });

      // supaya tombol disabled tidak bisa di klik (sudah pakai pointer-events + opacity)
      // bonus: juga handle fade lock simpel
      questionWrapper.addEventListener('transitionstart', () => {
        isFading = true;
      });
      questionWrapper.addEventListener('transitionend', () => {
        isFading = false;
      });

      // ---------- FULLSCREEN MODE (pojok kanan bawah) ----------
      const fullscreenToggle = document.getElementById('fullscreenToggle');
      const fsIcon = document.getElementById('fsIcon');

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().then(() => {
            fsIcon.innerText = '✕'; // tanda keluar
          }).catch(err => console.warn(err));
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen().then(() => {
              fsIcon.innerText = '⛶';
            });
          }
        }
      }

      fullscreenToggle.addEventListener('click', toggleFullscreen);

      // ubah icon saat fullscreen berubah via esc atau tombol
      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
          fsIcon.innerText = '✕';
        } else {
          fsIcon.innerText = '⛶';
        }
      });

      // ---------- FLOATING BACKGROUND (bintang/hati) ----------
      function createFloatingIcons() {
        const bg = document.getElementById('floatingBg');
        const icons = ['🌸', '✨', '🕊️', '💭', '🧁', '☁️', '🫧', '🌟', '🍃', '💫']; // soft
        for (let i = 0; i < 18; i++) {
          const item = document.createElement('div');
          item.className = 'float-item';
          item.textContent = icons[Math.floor(Math.random() * icons.length)];
          item.style.left = Math.random() * 100 + '%';
          item.style.top = Math.random() * 100 + '%';
          item.style.fontSize = (1.6 + Math.random() * 2) + 'rem';
          item.style.animationDelay = (Math.random() * 10) + 's';
          item.style.animationDuration = (14 + Math.random() * 12) + 's';
          bg.appendChild(item);
        }
      }
      createFloatingIcons();

      // jika di layar kecil, progress tetap ok
      // bisa juga handle resize dll (no need)
    })();
  </script>
</body>
</html>
