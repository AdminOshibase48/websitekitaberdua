<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>our story together | Untukmu, Dari Aku 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles/sorry.css" />
</head>
<body>

  <!-- Floating hearts background -->
  <div id="hearts-container" aria-hidden="true"></div>

  <!-- Main Game Container -->
  <div id="game">

    <!-- Background image -->
    <div id="bg-overlay"></div>
    <img id="scene-bg" src="" alt="" />

    <!-- Dialogue Box -->
    <div id="dialogue-box">
      <div id="speaker-name"></div>
      <div id="dialogue-text"></div>

      <!-- Extra message (for branching) -->
      <div id="extra-msg" class="hidden"></div>

      <!-- Choices -->
      <div id="choices"></div>

      <!-- Single next button -->
      <button id="btn-next" class="hidden">Lanjut ✨</button>
    </div>

    <!-- Scene counter -->
    <div id="scene-counter"></div>
  </div>

  <!-- Popup Overlay -->
  <div id="popup" class="hidden" role="dialog" aria-modal="true">
    <div id="popup-inner">
      <div id="popup-emoji">💕</div>
      <h2 id="popup-title">Terima Kasih...</h2>
      <p id="popup-msg"></p>
      <button id="popup-close">Tutup 🌸</button>
    </div>
  </div>

  <script src="../assets/scripts/sorry.js"></script>
</body>
</html>
